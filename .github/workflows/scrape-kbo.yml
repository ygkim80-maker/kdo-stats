name: Scrape KBO standings

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Debug KBO Record page
        run: |
          echo "=== /Record/Player/ content ==="
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html" -H "Accept-Language: ko-KR,ko;q=0.9" \
            "https://www.koreabaseball.com/Record/Player/" | head -c 5000
          echo ""
          echo "=== All aspx links on /Record/Player/ ==="
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html" -H "Accept-Language: ko-KR,ko;q=0.9" \
            "https://www.koreabaseball.com/Record/Player/" \
            | grep -oP '(?<=href="|href='"'"')[^"'"'"']+\.aspx[^"'"'"']*' | head -30
          echo "=== /Record/ main page links ==="
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html" -H "Accept-Language: ko-KR,ko;q=0.9" \
            "https://www.koreabaseball.com/Record/" \
            | grep -oP '(?<=href="|href='"'"')[^"'"'"']+\.aspx[^"'"'"']*' | head -30
      - name: Scrape standings
        run: node scripts/scrape-standings.mjs
      - name: Scrape player stats
        run: node scripts/scrape-players.mjs
      - name: Commit updated data
        run: |
          git config user.name "kbo-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update KBO data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "no changes"
          fi
