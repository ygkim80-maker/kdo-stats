name: Scrape KBO standings

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Debug KBO player URLs
        run: |
          echo "=== Testing KBO player stat URLs ==="
          for url in \
            "https://www.koreabaseball.com/Record/Player/HitterBasic/Basic.aspx" \
            "https://www.koreabaseball.com/Record/Player/HitterDetail/Basic1.aspx" \
            "https://www.koreabaseball.com/Record/Player/HitterRecord.aspx" \
            "https://www.koreabaseball.com/Record/Hitter/Basic.aspx" \
            "https://www.koreabaseball.com/Record/Player/" \
            "https://www.koreabaseball.com/Record/"; do
            echo "--- $url ---"
            curl -s -o /tmp/resp.html -w "HTTP %{http_code} size=%{size_download}" \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: text/html" -H "Accept-Language: ko-KR,ko;q=0.9" \
              -H "Referer: https://www.koreabaseball.com/" \
              "$url" || true
            echo ""
            grep -o 'href="[^"]*Record[^"]*"' /tmp/resp.html | head -5 || echo "(no record links)"
            grep -oP '(?<=href=")[^"]*\.aspx[^"]*' /tmp/resp.html | grep -i 'player\|hitter\|pitcher' | head -10 || echo "(no player links)"
          done
      - name: Scrape standings
        run: node scripts/scrape-standings.mjs
      - name: Scrape player stats
        run: node scripts/scrape-players.mjs
      - name: Commit updated data
        run: |
          git config user.name "kbo-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update KBO data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "no changes"
          fi
