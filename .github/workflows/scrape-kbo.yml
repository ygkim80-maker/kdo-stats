name: Scrape KBO standings

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run scraper
        run: node scripts/scrape-standings.mjs
      - name: Commit updated data
        run: |
          git config user.name "kbo-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/standings.json; then
            git add data/standings.json
            git commit -m "chore: update KBO standings data"
            git push
          else
            echo "no changes"
          fi
