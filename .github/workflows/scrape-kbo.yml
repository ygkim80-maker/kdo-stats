name: Scrape KBO standings

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: npm install playwright
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Find Chrome
        run: |
          echo "=== Chrome search ==="
          which google-chrome-stable chromium-browser chromium google-chrome 2>/dev/null || echo "not in PATH"
          ls /usr/bin/google-chrome* /usr/bin/chromium* /snap/bin/chromium 2>/dev/null || echo "not found"
      - name: Scrape standings
        run: node scripts/scrape-standings.mjs
      - name: Scrape player stats
        run: node scripts/scrape-players.mjs
      - name: Commit updated data
        run: |
          git config user.name "kbo-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update KBO data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "no changes"
          fi
