name: Scrape KBO standings

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Find player stats links from TeamRank page
        run: |
          echo "=== All links in TeamRank.aspx ==="
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept-Language: ko-KR,ko;q=0.9" \
            "https://www.koreabaseball.com/Record/TeamRank/TeamRank.aspx" \
            | grep -oP '(?<=href=")[^"]+(?=")' | sort -u | grep -i 'hitter\|pitcher\|player\|record\|stat' | head -40 || echo "(none)"
          echo "=== ALL .aspx links in TeamRank.aspx ==="
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept-Language: ko-KR,ko;q=0.9" \
            "https://www.koreabaseball.com/Record/TeamRank/TeamRank.aspx" \
            | grep -oP '(?<=href=")[^"]*\.aspx[^"]*(?=")' | sort -u | head -50
      - name: Install Playwright
        run: npm install playwright
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Scrape standings
        run: node scripts/scrape-standings.mjs
      - name: Scrape player stats
        run: node scripts/scrape-players.mjs
      - name: Commit updated data
        run: |
          git config user.name "kbo-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update KBO data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "no changes"
          fi
