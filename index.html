<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KIA 타이거즈 스탯 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --red:#C8102E; --dark-red:#8B0000; --black:#0D0D0D;
      --dark:#1A1A1A; --card:#222; --border:#333;
      --text:#F0F0F0; --muted:#999; --gold:#FFD700; --green:#2ECC71;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--black);color:var(--text);font-family:'Segoe UI','Malgun Gothic',sans-serif;min-height:100vh;}

    /* HEADER */
    header{background:linear-gradient(135deg,var(--dark-red) 0%,var(--black) 60%);padding:20px 24px 16px;border-bottom:2px solid var(--red);}
    .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .team-logo{width:60px;height:60px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid var(--gold);flex-shrink:0;}
    .header-info h1{font-size:1.6rem;font-weight:900;}
    .header-info p{font-size:0.8rem;color:var(--muted);margin-top:3px;}

    /* PLAYER SELECTOR */
    .selector-bar{background:var(--dark);border-bottom:1px solid var(--border);padding:12px 24px;}
    .selector-inner{max-width:1200px;margin:0 auto;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
    .type-btns{display:flex;gap:4px;}
    .type-btn{padding:7px 14px;border:1px solid var(--border);background:none;color:var(--muted);border-radius:20px;cursor:pointer;font-size:0.82rem;transition:all .2s;}
    .type-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
    .player-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:0.85rem;min-width:180px;cursor:pointer;}
    .fetch-btn{padding:7px 16px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:700;transition:opacity .2s;}
    .fetch-btn:hover{opacity:.85;}
    .fetch-btn:disabled{opacity:.5;cursor:not-allowed;}
    .status-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;}
    .status-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
    .status-dot.ok{background:var(--green);}
    .status-dot.err{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .status-text{font-size:0.75rem;color:var(--muted);}

    /* PLAYER HEADER CARD */
    .player-card{max-width:1200px;margin:20px auto 0;padding:0 24px;}
    .p-card-inner{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
    .p-avatar{width:64px;height:64px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid var(--gold);flex-shrink:0;}
    .p-name{font-size:1.5rem;font-weight:900;}
    .p-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
    .p-tag{font-size:0.72rem;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:3px 9px;border-radius:12px;color:var(--muted);}
    .p-tag b{color:var(--text);}
    .badge-mvp{background:linear-gradient(135deg,var(--gold),#FFA500);color:#000;font-size:0.65rem;font-weight:800;padding:3px 9px;border-radius:12px;}

    /* TABS */
    .tab-bar{max-width:1200px;margin:16px auto 0;padding:0 24px;}
    .tab-bar-inner{border-bottom:1px solid var(--border);display:flex;gap:4px;}
    .tab-btn{padding:9px 16px;background:none;border:none;color:var(--muted);font-size:0.83rem;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
    .tab-btn.active{color:var(--text);border-bottom-color:var(--gold);}

    /* MAIN */
    main{max-width:1200px;margin:0 auto;padding:20px 24px;}

    /* HERO STATS */
    .hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
    .s-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:transform .2s,border-color .2s;}
    .s-card:hover{transform:translateY(-2px);border-color:var(--red);}
    .s-card.hl{border-color:var(--gold);background:linear-gradient(135deg,rgba(255,215,0,.07),var(--card));}
    .s-card .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
    .s-card .val{font-size:1.7rem;font-weight:900;line-height:1;}
    .s-card .rnk{font-size:.68rem;color:var(--gold);margin-top:3px;}

    /* SECTION */
    .section{margin-bottom:24px;}
    .sec-title{font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.83rem;}
    thead th{background:var(--dark);color:var(--muted);font-size:.7rem;text-transform:uppercase;padding:9px 10px;text-align:center;border-bottom:1px solid var(--border);}
    tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
    tbody tr:hover{background:rgba(255,255,255,.03);}
    tbody td{padding:9px 10px;text-align:center;}
    .yr-col{color:var(--gold);font-weight:700;}
    .best{color:#58D68D;font-weight:700;}
    .hl-row{background:rgba(200,16,46,.08);}

    /* ADV CARDS */
    .adv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;}
    .adv-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;}
    .adv-card .a-lbl{font-size:.7rem;color:var(--muted);}
    .adv-card .a-name{font-size:.85rem;font-weight:700;margin:3px 0 10px;}
    .adv-card .a-val{font-size:1.9rem;font-weight:900;margin-bottom:6px;}
    .bar-bg{background:var(--border);border-radius:4px;height:5px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:4px;transition:width 1s ease;}
    .bar-lbl{display:flex;justify-content:space-between;font-size:.66rem;color:var(--muted);margin-top:3px;}

    /* PITCHER STATS */
    .pitch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}

    /* CHARTS */
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:700px){.chart-grid{grid-template-columns:1fr;}}
    .c-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
    .c-card h3{font-size:.78rem;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}

    /* RADAR */
    .radar-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
    @media(max-width:700px){.radar-wrap{grid-template-columns:1fr;}}
    .radar-desc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
    .radar-desc h3{font-size:.95rem;font-weight:800;margin-bottom:10px;color:var(--gold);}
    .radar-desc ul{list-style:none;margin-top:10px;}
    .radar-desc ul li{font-size:.8rem;padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
    .radar-desc ul li span{color:var(--gold);font-weight:700;}

    /* TABS */
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* SKELETON LOADER */
    .skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:80px;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    footer{text-align:center;padding:20px;color:var(--muted);font-size:.72rem;border-top:1px solid var(--border);margin-top:20px;}
  </style>
</head>

    <div class="status-dot" id="statusDot"></div>

  </div>
</div>

<div class="player-card">

    </div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab-btn active" onclick="setTab('basic')">기본 스탯</button>

    <button class="tab-btn" onclick="setTab('trend')">연도별 추이</button>
    <button class="tab-btn" onclick="setTab('career')">통산 기록</button>
  </div>
</div>

<main>

      <div class="tbl-wrap"><table id="detailTable"><thead><tr id="detailHead"></tr></thead><tbody><tr id="detailRow"></tr></tbody></table></div>
    </div>
  </div>
  <div id="panel-advanced" class="tab-panel">
    <div class="section"><div class="sec-title">세이버메트릭스</div><div class="adv-grid" id="advGrid"></div></div>
    <div class="section">
      <div class="sec-title">능력치 레이더</div>
      <div class="radar-wrap">

        <div class="radar-desc"><h3 id="radarTitle">시즌 요약</h3><p id="radarDesc"></p><ul id="radarList"></ul></div>
      </div>
    </div>
  </div>
  <div id="panel-trend" class="tab-panel">
    <div class="chart-grid">

    </div>
  </div>
  <div id="panel-career" class="tab-panel">
    <div class="section"><div class="sec-title">연도별 통산 기록</div>
      <div class="tbl-wrap"><table><thead><tr id="careerHead"></tr></thead><tbody id="careerBody"></tbody></table></div>
    </div>
  </div>
</main>

// ─── CORS PROXY 실시간 fetch ──────────────────────────────
const PROXY = 'https://api.allorigins.win/raw?url=';
const KBO_HITTER = id => `https://www.koreabaseball.com/Record/Player/HitterDetail/Basic.aspx?playerId=${id}`;
const KBO_PITCHER = id => `https://www.koreabaseball.com/Record/Player/PitcherDetail/Basic.aspx?playerId=${id}`;

async function fetchLiveData() {
  const p = currentPlayer;
  if(!p) return;
  const btn = document.getElementById('fetchBtn');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  btn.disabled = true;
  dot.className = 'status-dot loading';
  txt.textContent = '불러오는 중...';
  try {
    const url = currentType === 'hitter' ? KBO_HITTER(p.id) : KBO_PITCHER(p.id);
    const res = await fetch(PROXY + encodeURIComponent(url));
    if(!res.ok) throw new Error('fetch failed');
    const html = await res.text();
    const parsed = currentType === 'hitter' ? parseHitterStats(html) : parsePitcherStats(html);
    if(parsed) {
      if(!CAREER_STATS[p.id]) CAREER_STATS[p.id] = {};
      if(!CAREER_STATS[p.id][currentType]) CAREER_STATS[p.id][currentType] = {};
      CAREER_STATS[p.id][currentType]['2026'] = parsed;
      dot.className = 'status-dot ok';
      txt.textContent = `최신 데이터 반영 완료 (${new Date().toLocaleTimeString('ko-KR')})`;
    } else {
      throw new Error('parse failed');
    }
  } catch(e) {
    dot.className = 'status-dot err';
    txt.textContent = '데이터 불러오기 실패 (캐시 데이터 표시 중)';
  }
  btn.disabled = false;
  refreshView();
}

function parseHitterStats(html) {
  try {
    const dp = new DOMParser();
    const doc = dp.parseFromString(html, 'text/html');
    const rows = doc.querySelectorAll('#tblBasic tbody tr, .tblType01 tbody tr, table tbody tr');
    for(const row of rows) {
      const cells = row.querySelectorAll('td');
      if(cells.length >= 16) {
        const yr = cells[0]?.textContent?.trim();
        if(yr === '2026') {
          return {
            G:+cells[1]?.textContent||0, PA:+cells[2]?.textContent||0,
            AB:+cells[3]?.textContent||0, H:+cells[4]?.textContent||0,
            '2B':+cells[5]?.textContent||0, '3B':+cells[6]?.textContent||0,
            HR:+cells[7]?.textContent||0, RBI:+cells[8]?.textContent||0,
            R:+cells[9]?.textContent||0, SB:+cells[10]?.textContent||0,
            BB:+cells[11]?.textContent||0, SO:+cells[12]?.textContent||0,
            AVG:+cells[13]?.textContent||0, OBP:+cells[14]?.textContent||0,
            SLG:+cells[15]?.textContent||0,
            OPS:+(+cells[14]?.textContent + +cells[15]?.textContent).toFixed(3)||0,
            WAR:null,wRC:null,wOBA:null,BABIP:null,ISO:null,BBp:null,Kp:null
          };
        }
      }
    }
    return null;
  } catch(e){ return null; }
}

function parsePitcherStats(html) {
  try {
    const dp = new DOMParser();
    const doc = dp.parseFromString(html, 'text/html');
    const rows = doc.querySelectorAll('table tbody tr');
    for(const row of rows) {
      const cells = row.querySelectorAll('td');
      if(cells.length >= 12) {
        const yr = cells[0]?.textContent?.trim();
        if(yr === '2026') {
          return {
            G:+cells[1]?.textContent||0,
            W:+cells[3]?.textContent||0, L:+cells[4]?.textContent||0,
            SV:+cells[5]?.textContent||0, HLD:+cells[6]?.textContent||0,
            IP:cells[7]?.textContent?.trim()||'0',
            ERA:+cells[2]?.textContent||0,
            WHIP:+cells[11]?.textContent||0,
            SO:+cells[12]?.textContent||0,
            BB:+cells[9]?.textContent||0,
            H:+cells[8]?.textContent||0,
            HR:0, QS:0, WAR:null
          };
        }
      }
    }
    return null;
  } catch(e){ return null; }
}

let radarChart=null;
function renderRadar(s) {
  const data={labels:['타율','장타력','출루','선구안','주루','컨택'],datasets:[{
    label:'2026 시즌',
    data:[
      Math.min((s.AVG||0)/.400*100,100),
      Math.min((s.ISO||0)/.400*100,100),
      Math.min((s.OBP||0)/.500*100,100),
      Math.min((s.BBp||0)/20*100,100),
      Math.min((s.SB||0)/50*100,100),
      Math.min((1-(s.Kp||0)/30)*100,100),
    ],
    backgroundColor:'rgba(200,16,46,0.25)',borderColor:'#C8102E',pointBackgroundColor:'#FFD700',borderWidth:2
  }]};
  if(radarChart) radarChart.destroy();
  radarChart=new Chart(document.getElementById('radarChart'),{type:'radar',data,options:{
    scales:{r:{min:0,max:100,grid:{color:'#333'},pointLabels:{color:'#ccc',font:{size:12}},ticks:{display:false},angleLines:{color:'#333'}}},
    plugins:{legend:{labels:{color:'#ccc'}}}
  }});
  document.getElementById('radarTitle').textContent=`${currentPlayer.name} 2026 능력치`;
  document.getElementById('radarList').innerHTML=[
    {l:'OPS',v:s.OPS?.toFixed(3)},{l:'wRC+',v:s.wRC},{l:'WAR',v:s.WAR?.toFixed(1)},
    {l:'BB%',v:s.BBp?.toFixed(1)+'%'},{l:'K%',v:s.Kp?.toFixed(1)+'%'},{l:'ISO',v:s.ISO?.toFixed(3)}
  ].map(i=>`<li>${i.l} <span>${i.v||'-'}</span></li>`).join('');
}

    label:'2026 시즌',
    data:[
      Math.max(0,(1-(s.ERA||9)/6)*100),
      Math.max(0,(1-(s.WHIP||3)/2.5)*100),
      Math.min((s.SO||0)/200*100,100),
      Math.max(0,(1-(s.BB||80)/80)*100),
      Math.min((s.QS||0)/20*100,100),
      Math.min(((s.WAR||0)+2)/8*100,100),
    ],
    backgroundColor:'rgba(200,16,46,0.25)',borderColor:'#C8102E',pointBackgroundColor:'#FFD700',borderWidth:2
  }]};
  if(radarChart) radarChart.destroy();
  radarChart=new Chart(document.getElementById('radarChart'),{type:'radar',data,options:{
    scales:{r:{min:0,max:100,grid:{color:'#333'},pointLabels:{color:'#ccc',font:{size:12}},ticks:{display:false},angleLines:{color:'#333'}}},
    plugins:{legend:{labels:{color:'#ccc'}}}
  }});
  document.getElementById('radarTitle').textContent=`${currentPlayer.name} 2026 능력치`;
  document.getElementById('radarList').innerHTML=[
    {l:'ERA',v:s.ERA?.toFixed(2)},{l:'WHIP',v:s.WHIP?.toFixed(2)},{l:'K',v:s.SO},
    {l:'BB',v:s.BB},{l:'IP',v:s.IP},{l:'W-L',v:`${s.W}-${s.L}`}
  ].map(i=>`<li>${i.l} <span>${i.v||'-'}</span></li>`).join('');
}

// ─ 추이 ─
let avgChart=null,hrChart=null,opsChart=null,warChart=null;
function renderTrend() {
  const yrs = getAllYears();
  const chartOpts = ()=>({responsive:true,plugins:{legend:{labels:{color:'#ccc',boxWidth:12}}},scales:{x:{ticks:{color:'#999'},grid:{color:'#2a2a2a'}},y:{ticks:{color:'#999'},grid:{color:'#2a2a2a'}}}});

  if(currentType==='hitter') {
    if(avgChart) avgChart.destroy();
    avgChart=new Chart(document.getElementById('avgChart'),{type:'line',data:{labels:yrs,datasets:[
      {label:'AVG',data:yrs.map(y=>getStats(y)?.AVG||null),borderColor:'#2ECC71',tension:.4,pointBackgroundColor:'#2ECC71'},
      {label:'OBP',data:yrs.map(y=>getStats(y)?.OBP||null),borderColor:'#3498DB',tension:.4,pointBackgroundColor:'#3498DB'},
      {label:'SLG',data:yrs.map(y=>getStats(y)?.SLG||null),borderColor:'#E74C3C',tension:.4,pointBackgroundColor:'#E74C3C'},
    ]},options:chartOpts()});
    if(hrChart) hrChart.destroy();
    hrChart=new Chart(document.getElementById('hrChart'),{type:'bar',data:{labels:yrs,datasets:[
      {label:'홈런',data:yrs.map(y=>getStats(y)?.HR||0),backgroundColor:'rgba(231,76,60,.8)'},
      {label:'도루',data:yrs.map(y=>getStats(y)?.SB||0),backgroundColor:'rgba(155,89,182,.8)'},
      {label:'타점',data:yrs.map(y=>getStats(y)?.RBI||0),backgroundColor:'rgba(230,126,34,.8)'},
    ]},options:chartOpts()});
    if(opsChart) opsChart.destroy();
    opsChart=new Chart(document.getElementById('opsChart'),{type:'line',data:{labels:yrs,datasets:[{label:'OPS',data:yrs.map(y=>getStats(y)?.OPS||null),borderColor:'#3498DB',backgroundColor:'rgba(52,152,219,.1)',fill:true,tension:.4,pointBackgroundColor:'#FFD700',pointRadius:6}]},options:chartOpts()});
  } else {
    if(avgChart) avgChart.destroy();
    avgChart=new Chart(document.getElementById('avgChart'),{type:'line',data:{labels:yrs,datasets:[
      {label:'ERA',data:yrs.map(y=>getStats(y)?.ERA||null),borderColor:'#E74C3C',tension:.4},
      {label:'WHIP',data:yrs.map(y=>getStats(y)?.WHIP||null),borderColor:'#E67E22',tension:.4},
    ]},options:chartOpts()});
    if(hrChart) hrChart.destroy();
    hrChart=new Chart(document.getElementById('hrChart'),{type:'bar',data:{labels:yrs,datasets:[
      {label:'승',data:yrs.map(y=>getStats(y)?.W||0),backgroundColor:'rgba(46,204,113,.8)'},
      {label:'패',data:yrs.map(y=>getStats(y)?.L||0),backgroundColor:'rgba(231,76,60,.8)'},
      {label:'탈삼진',data:yrs.map(y=>getStats(y)?.SO||0),backgroundColor:'rgba(52,152,219,.6)'},
    ]},options:chartOpts()});
    if(opsChart) opsChart.destroy();
    opsChart=new Chart(document.getElementById('opsChart'),{type:'line',data:{labels:yrs,datasets:[{label:'이닝',data:yrs.map(y=>{const s=getStats(y);if(!s)return null;return parseFloat(s.IP)||0;}),borderColor:'#9B59B6',backgroundColor:'rgba(155,89,182,.1)',fill:true,tension:.4,pointBackgroundColor:'#FFD700',pointRadius:6}]},options:chartOpts()});
  }
  if(warChart) warChart.destroy();
  warChart=new Chart(document.getElementById('warChart'),{type:'bar',data:{labels:yrs,datasets:[{label:'WAR',data:yrs.map(y=>getStats(y)?.WAR||0),backgroundColor:yrs.map(y=>y==='2024'?'#FFD700':'rgba(200,16,46,.7)')}]},options:chartOpts()});
}

// ─ 통산 ─
function renderCareer() {
  const yrs = getAllYears();
  if(currentType==='hitter') {
    document.getElementById('careerHead').innerHTML='<th>연도</th><th>G</th><th>PA</th><th>AB</th><th>H</th><th>2B</th><th>3B</th><th>HR</th><th>RBI</th><th>R</th><th>SB</th><th>BB</th><th>SO</th><th>AVG</th><th>OBP</th><th>SLG</th><th>OPS</th><th>WAR</th>';
    document.getElementById('careerBody').innerHTML=yrs.map(y=>{
      const s=getStats(y); if(!s)return`<tr><td class="yr-col">${y}</td><td colspan="17" style="color:var(--muted)">부상/데이터없음</td></tr>`;
      const best=y==='2024';
      return`<tr class="${best?'hl-row':''}"><td class="yr-col">${y}${best?' ★':''}</td>
        <td>${s.G}</td><td>${s.PA}</td><td>${s.AB}</td>
        <td class="${best?'best':''}">${s.H}</td><td>${s['2B']}</td><td>${s['3B']}</td>
        <td class="${best?'best':''}">${s.HR}</td><td>${s.RBI}</td>
        <td class="${best?'best':''}">${s.R}</td><td>${s.SB}</td><td>${s.BB}</td><td>${s.SO}</td>
        <td class="${best?'best':''}">${s.AVG.toFixed(3)}</td>
        <td>${s.OBP.toFixed(3)}</td><td>${s.SLG.toFixed(3)}</td>
        <td class="${best?'best':''}">${s.OPS.toFixed(3)}</td>
        <td class="${best?'best':''}">${s.WAR!==null?s.WAR.toFixed(1):'-'}</td></tr>`;
    }).join('');
  } else {
    document.getElementById('careerHead').innerHTML='<th>연도</th><th>G</th><th>W</th><th>L</th><th>SV</th><th>HLD</th><th>IP</th><th>ERA</th><th>WHIP</th><th>SO</th><th>BB</th><th>H</th><th>WAR</th>';
    document.getElementById('careerBody').innerHTML=yrs.map(y=>{
      const s=getStats(y); if(!s)return`<tr><td class="yr-col">${y}</td><td colspan="12" style="color:var(--muted)">데이터없음</td></tr>`;
      return`<tr><td class="yr-col">${y}</td>
        <td>${s.G}</td><td>${s.W}</td><td>${s.L}</td><td>${s.SV}</td><td>${s.HLD}</td>
        <td>${s.IP}</td><td>${s.ERA.toFixed(2)}</td><td>${s.WHIP.toFixed(2)}</td>
        <td>${s.SO}</td><td>${s.BB}</td><td>${s.H}</td>
        <td>${s.WAR!==null?s.WAR.toFixed(1):'-'}</td></tr>`;
    }).join('');
  }
}

// ─── TAB & NAV ───────────────────────────────────────────
function setTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(currentPlayer) refreshView();
}
